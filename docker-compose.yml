services:
  ferricstore:
    image: ${FERRICSTORE_IMAGE:-ghcr.io/ferricstore/ferricstore:0.10.1@sha256:198cffba8e2df2f5f66db9e6bbef83131f4841d4b90c65ee8091ac463ec6715d}
    environment:
      FERRICSTORE_PROTECTED_MODE: "false"
      FERRICSTORE_SHARD_COUNT: "${FERRICSTORE_SHARD_COUNT:-4}"
      FERRICSTORE_NATIVE_ENABLED: "true"
      FERRICSTORE_NATIVE_BIND: "0.0.0.0"
      FERRICSTORE_NATIVE_PORT: "6388"
      FERRICSTORE_NATIVE_ADVERTISE_HOST: "${FERRICSTORE_NATIVE_ADVERTISE_HOST:-127.0.0.1}"
      FERRICSTORE_NATIVE_ADVERTISE_PORT: "${FERRICSTORE_NATIVE_ADVERTISE_PORT:-6388}"
      FERRICSTORE_NATIVE_RESPONSE_CHUNK_BYTES: "${FERRICSTORE_NATIVE_RESPONSE_CHUNK_BYTES:-0}"
    ports:
      - "${FERRICSTORE_PORT:-6388}:6388"
    volumes:
      - ferricstore-data:/data

volumes:
  ferricstore-data:
