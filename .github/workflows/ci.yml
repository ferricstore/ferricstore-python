name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src/ferricstore

      - name: Pytest
        run: python -m pytest --cov=ferricstore --cov-report=term-missing

      - name: Dependency consistency
        run: python -m pip check

  package:
    name: Package dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

  integration:
    name: FerricStore integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start FerricStore
        run: |
          docker compose up -d ferricstore
          python scripts/wait_for_ferricstore.py

      - name: Run integration tests
        run: python -m pytest tests/integration
        env:
          FERRICSTORE_INTEGRATION: "1"

      - name: FerricStore logs
        if: always()
        run: docker compose logs ferricstore

      - name: Stop FerricStore
        if: always()
        run: docker compose down -v
