name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify release tag
        run: python scripts/check_release_version.py "${GITHUB_REF_NAME}"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src/ferricstore

      - name: Pytest
        run: python -m pytest --cov=ferricstore --cov-report=term-missing --cov-report=json:coverage.json

      - name: Critical module coverage
        run: python scripts/check_critical_coverage.py coverage.json

      - name: Bandit
        run: python -m bandit -q -c pyproject.toml -r src/ferricstore

      - name: Build
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  integration:
    name: FerricStore integration
    runs-on: ubuntu-latest
    env:
      FERRICSTORE_IMAGE: ghcr.io/ferricstore/ferricstore:0.10.1@sha256:198cffba8e2df2f5f66db9e6bbef83131f4841d4b90c65ee8091ac463ec6715d

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start FerricStore
        run: |
          docker compose up -d ferricstore
          FERRICSTORE_PORT=6388 FERRICSTORE_WAIT_STABLE_SECONDS=15 \
            python scripts/wait_for_ferricstore.py

      - name: Run native integration tests
        run: python -m pytest tests/integration
        env:
          FERRICSTORE_INTEGRATION: "1"
          FERRICSTORE_URL: "ferric://127.0.0.1:6388"

      - name: FerricStore logs
        if: always()
        run: docker compose logs ferricstore

      - name: Stop FerricStore
        if: always()
        run: docker compose down -v

  publish:
    name: Publish to PyPI
    needs: [build, integration]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ferricstore/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
