services:
  ferricstore:
    image: ${FERRICSTORE_IMAGE:-ferricstore/ferricstore:latest}
    ports:
      - "${FERRICSTORE_PORT:-6379}:6379"
    environment:
      MIX_ENV: prod
      FERRICSTORE_PORT: 6379
      FERRICSTORE_DATA_DIR: /data/ferricstore
      FERRICSTORE_SHARD_COUNT: ${FERRICSTORE_SHARD_COUNT:-4}
      FERRICSTORE_PROTECTED_MODE: "false"
      FERRICSTORE_LOG_LEVEL: error
    volumes:
      - ferricstore-data:/data/ferricstore

volumes:
  ferricstore-data:

