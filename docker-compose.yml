services:
  ferricstore:
    image: ${FERRICSTORE_IMAGE:-ghcr.io/ferricstore/ferricstore:0.5.1}
    environment:
      FERRICSTORE_NATIVE_ENABLED: "true"
      FERRICSTORE_PROTECTED_MODE: "false"
      FERRICSTORE_SHARD_COUNT: "${FERRICSTORE_SHARD_COUNT:-4}"
    ports:
      - "6379:6379"
      - "6388:6388"
    volumes:
      - ferricstore-data:/data

volumes:
  ferricstore-data:
